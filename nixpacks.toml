# Railway build config (Nixpacks).
# The backend imports the `ml` package from the repo root, so we build and run
# from the repo root — NOT from /backend. Set Railway's "Root Directory" to the
# repository root (the default) for this to work.

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install --no-cache-dir -r backend/requirements.txt"]

[start]
cmd = "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
